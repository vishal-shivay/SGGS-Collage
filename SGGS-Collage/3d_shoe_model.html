
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div style="width:100%;height:520px;position:relative;border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary);">
  <canvas id="shoeCanvas" style="width:100%;height:100%;display:block;"></canvas>
  <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <button onclick="setColor('#e63946')" style="background:#e63946;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.4);"></button>
    <button onclick="setColor('#2196f3')" style="background:#2196f3;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.4);"></button>
    <button onclick="setColor('#111111')" style="background:#111;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.4);"></button>
    <button onclick="setColor('#f8f0e3')" style="background:#f8f0e3;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,0.2);"></button>
    <button onclick="setColor('#2d6a4f')" style="background:#2d6a4f;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.4);"></button>
    <button onclick="setColor('#ff9f1c')" style="background:#ff9f1c;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.4);"></button>
  </div>
  <div style="position:absolute;top:12px;right:14px;font-size:12px;color:var(--color-text-secondary);">drag to rotate · scroll to zoom</div>
</div>

<script>
const canvas = document.getElementById('shoeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(40, canvas.parentElement.offsetWidth / canvas.parentElement.offsetHeight, 0.1, 100);
camera.position.set(4.5, 2.5, 5);
camera.lookAt(0, 0.3, 0);

function resize() {
  const w = canvas.parentElement.offsetWidth;
  const h = canvas.parentElement.offsetHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(5, 8, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
fill.position.set(-4, 2, -3);
scene.add(fill);

// Shadow plane
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.ShadowMaterial({ opacity: 0.2 })
);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -0.82;
plane.receiveShadow = true;
scene.add(plane);

let shoeColor = '#e63946';
const parts = {};

function makeMat(color, rough=0.6, metal=0.0) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });
}

function buildShoe(color) {
  const group = new THREE.Group();

  // ---- SOLE ----
  const soleMat = makeMat('#222222', 0.9, 0.0);
  // Main sole — elongated box with rounded feel via scaling
  const soleGeo = new THREE.BoxGeometry(2.8, 0.22, 1.0);
  const sole = new THREE.Mesh(soleGeo, soleMat);
  sole.position.set(0, -0.6, 0);
  sole.castShadow = true; sole.receiveShadow = true;
  group.add(sole);

  // Heel block (thicker)
  const heelGeo = new THREE.BoxGeometry(0.9, 0.25, 1.0);
  const heel = new THREE.Mesh(heelGeo, soleMat);
  heel.position.set(-0.98, -0.48, 0);
  heel.castShadow = true;
  group.add(heel);

  // Toe curve
  const toeCurve = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 1.0, 20, 1, false, -Math.PI/2, Math.PI/2),
    soleMat
  );
  toeCurve.rotation.z = Math.PI/2;
  toeCurve.position.set(1.4, -0.49, 0);
  toeCurve.scale.set(0.22, 1, 1);
  toeCurve.castShadow = true;
  group.add(toeCurve);

  // Midsole (white strip)
  const midMat = makeMat('#f0f0f0', 0.8);
  const mid = new THREE.Mesh(new THREE.BoxGeometry(2.82, 0.1, 1.02), midMat);
  mid.position.set(0, -0.48, 0);
  group.add(mid);

  // ---- UPPER (main body) ----
  const upMat = makeMat(color, 0.55, 0.05);
  parts.upper = upMat;

  // Back upper (heel cup)
  const backUpper = new THREE.Mesh(
    new THREE.BoxGeometry(0.85, 0.7, 0.95),
    upMat
  );
  backUpper.position.set(-1.02, -0.08, 0);
  backUpper.castShadow = true;
  group.add(backUpper);

  // Rounded heel cap
  const heelCap = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 16, 16, 0, Math.PI),
    upMat
  );
  heelCap.rotation.y = Math.PI;
  heelCap.scale.set(0.88, 0.7, 0.95);
  heelCap.position.set(-1.43, -0.08, 0);
  heelCap.castShadow = true;
  group.add(heelCap);

  // Mid upper body
  const midUpper = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 0.6, 0.9),
    upMat
  );
  midUpper.position.set(0.0, -0.09, 0);
  midUpper.castShadow = true;
  group.add(midUpper);

  // Toe box (tapered front) - use scaled sphere
  const toeBox = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 20, 14, 0, Math.PI * 2, 0, Math.PI * 0.6),
    upMat
  );
  toeBox.scale.set(0.8, 0.55, 0.8);
  toeBox.rotation.z = 0.1;
  toeBox.position.set(1.15, -0.18, 0);
  toeBox.castShadow = true;
  group.add(toeBox);

  // ---- TONGUE ----
  const tongueMat = makeMat(color, 0.7);
  parts.tongue = tongueMat;
  const tongue = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 0.55, 0.7),
    tongueMat
  );
  tongue.position.set(0.3, 0.16, 0);
  tongue.castShadow = true;
  group.add(tongue);

  // ---- COLLAR (ankle opening) ----
  const collarMat = makeMat(color, 0.75);
  parts.collar = collarMat;
  const collarGeo = new THREE.TorusGeometry(0.42, 0.1, 10, 30, Math.PI);
  const collar = new THREE.Mesh(collarGeo, collarMat);
  collar.rotation.y = -Math.PI/2;
  collar.position.set(-0.72, 0.15, 0);
  collar.castShadow = true;
  group.add(collar);

  // ---- LACES ----
  const laceMat = makeMat('#ffffff', 0.9);
  const lacePositions = [-0.1, 0.15, 0.4, 0.65];
  lacePositions.forEach((x) => {
    const lace = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.05, 0.72),
      laceMat
    );
    lace.position.set(x, 0.22, 0);
    group.add(lace);
  });
  // Lace holes (eyelets)
  const eyeletMat = makeMat('#888888', 0.4, 0.8);
  lacePositions.forEach((x) => {
    [-0.29, 0.29].forEach((z) => {
      const eyelet = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 0.06, 8),
        eyeletMat
      );
      eyelet.rotation.x = Math.PI/2;
      eyelet.position.set(x, 0.22, z);
      group.add(eyelet);
    });
  });

  // ---- LOGO STRIPE (side decal) ----
  const stripeMat = makeMat('#ffffff', 0.5, 0.1);
  parts.stripe = stripeMat;
  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, 0.06, 0.04),
    stripeMat
  );
  stripe.rotation.z = -0.18;
  stripe.position.set(0.2, -0.02, 0.46);
  group.add(stripe);

  // Second stripe
  const stripe2 = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.06, 0.04),
    stripeMat
  );
  stripe2.rotation.z = -0.18;
  stripe2.position.set(0.15, -0.12, 0.46);
  group.add(stripe2);

  // Third stripe
  const stripe3 = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.06, 0.04),
    stripeMat
  );
  stripe3.rotation.z = -0.18;
  stripe3.position.set(0.1, -0.22, 0.46);
  group.add(stripe3);

  group.rotation.y = 0.3;
  return group;
}

let shoeGroup = buildShoe(shoeColor);
scene.add(shoeGroup);

window.setColor = function(c) {
  shoeColor = c;
  scene.remove(shoeGroup);
  shoeGroup = buildShoe(c);
  scene.add(shoeGroup);
};

// Orbit controls (manual)
let isDragging = false, prevX = 0, prevY = 0;
let rotY = 0.3, rotX = 0.2;

canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
canvas.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - prevX) * 0.01;
  rotX += (e.clientY - prevY) * 0.008;
  rotX = Math.max(-0.5, Math.min(0.7, rotX));
  prevX = e.clientX; prevY = e.clientY;
});
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  rotY += (e.touches[0].clientX - prevX) * 0.01;
  rotX += (e.touches[0].clientY - prevY) * 0.008;
  rotX = Math.max(-0.5, Math.min(0.7, rotX));
  prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
});

canvas.addEventListener('wheel', e => {
  camera.position.multiplyScalar(e.deltaY > 0 ? 1.08 : 0.93);
  e.preventDefault();
}, { passive: false });

let autoRotate = true;
canvas.addEventListener('mousedown', () => autoRotate = false);
canvas.addEventListener('touchstart', () => autoRotate = false);

function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) rotY += 0.005;
  shoeGroup.rotation.y = rotY;
  shoeGroup.rotation.x = rotX;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', resize);
</script>
