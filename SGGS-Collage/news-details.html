<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>News Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
         <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" /> -->
        
         <link rel="stylesheet" href="./css/navbar.css">
         <link rel="stylesheet" href="./css/footer.css">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <link rel="stylesheet" href="./css/news.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
         
  <style>
    *{
      box-sizing: border-box;
      padding: 0px;
      margin: 0px;
    }
    body {
      font-family: "Inter", sans-serif;
      background: #f5f6fa;
      margin: 0;
 
    }

    .news-wrapper {
      max-width: 900px;
      margin: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .news-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .news-content {
      padding: 30px;
    }

    .news-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 15px;
      color: #8c1007;
    }

    .news-date {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }

    .news-description {
      font-size: 16px;
      line-height: 1.7;
      color: #444;
    }

    .back-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 20px;
      background: #8c1007;
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: red;
    }

    .error {
      text-align: center;
      color: red;
      font-weight: 600;
    }
  </style>
</head>

<body>
<div id="navbar"></div>
  <div class="news-wrapper" id="newsWrapper">
    <p style="text-align:center">Loading news...</p>
  </div>

  <script>
const params = new URLSearchParams(window.location.search);
const newsId = params.get("id");

async function loadNewsDetails() {
  if (!newsId) {
    document.getElementById("newsWrapper").innerHTML =
      "<p class='error'>No news selected</p>";
    return;
  }

  try {
    console.log("Fetching news ID:", newsId);
    const res = await fetch(`https://final-collage-1.onrender.com/news/${newsId}`);
    if (!res.ok) throw new Error("News not found");

    const news = await res.json();
      const baseURL = "https://final-collage-1.onrender.com";

    const imagePath = news.image.startsWith("http") 
      ? news.image
      : `${baseURL}/${news.image.replace(/^\/+/, "")}`;

    document.getElementById("newsWrapper").innerHTML = `
      <img class="news-image" src="${imagePath}" />
      <div class="news-content">
        <div class="news-title">${news.title}</div>
        <div class="news-date">${new Date(news.createdAt).toDateString()}</div>
        <div class="news-description">${news.description}</div>
        <a href="index.html" class="back-btn">← Back</a>
      </div>
    `;
  } catch (err) {
    console.error(err);
    document.getElementById("newsWrapper").innerHTML =
      "<p class='error'>Failed to load news</p>";
  }
}
      
loadNewsDetails();

</script>
<div id="footer"></div>

  <script>
  // Load Navbar
  fetch('./component/navbar.html')
    .then(response => response.text())
    .then(data => document.getElementById('navbar').innerHTML = data);

  // Load Footer
  fetch('./component/footer.html')
    .then(response => response.text())
    .then(data => document.getElementById('footer').innerHTML = data);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
